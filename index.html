<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トミ式・初級韓国語1秒暗記トレーニング</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --success-color: #27ae60;
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-main: #34495e;
            --text-sub: #7f8c8d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            position: relative;
        }

        /* Navigation Bar */
        .nav-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
        }

        .btn-back {
            background: rgba(44, 62, 80, 0.1);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            display: none;
            /* Hidden by default */
            transition: background 0.2s;
        }

        .btn-back:hover {
            background: rgba(44, 62, 80, 0.2);
        }

        /* Screens */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            min-height: 400px;
            transition: opacity 0.3s ease;
            position: relative;
        }

        .screen.active {
            display: flex;
        }

        /* Typography */
        h1 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--primary-color);
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: var(--text-sub);
        }

        .korean-word {
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: var(--primary-color);
            line-height: 1.2;
            cursor: pointer;
        }

        .japanese-word {
            font-size: 2rem;
            color: var(--text-sub);
            margin-bottom: 2rem;
            min-height: 2.4rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .japanese-word.visible {
            opacity: 1;
        }

        /* Buttons */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin: 10px;
            min-width: 200px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-large {
            font-size: 1.3rem;
            padding: 20px 40px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            width: 100%;
            max-width: 300px;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            width: 100%;
            justify-content: center;
        }

        .btn-success {
            background-color: var(--success-color);
            flex: 1;
        }

        .btn-retry {
            background-color: var(--accent-color);
            flex: 1;
        }

        /* Group List Style */
        .group-list {
            display: grid;
            gap: 10px;
            width: 100%;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 5px;
        }

        .group-item {
            background: #f8f9fa;
            border: 2px solid #bdc3c7;
            border-radius: 10px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .group-item:hover {
            transform: translateX(5px);
            border-color: var(--accent-color);
            background: #fff;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background-color: #eee;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Result Screen */
        .result-stats {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        .confetti {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Practice Mode Specific */
        .practice-guide {
            font-size: 1.5rem;
            color: var(--accent-color);
            font-weight: bold;
            margin: 20px 0;
            padding: 15px;
            border: 2px dashed var(--accent-color);
            border-radius: 10px;
            background-color: #fdf2f0;
        }

        /* Pause & Overlay */
        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            z-index: 50;
        }

        .pause-overlay.visible {
            display: flex;
        }

        .pause-text {
            color: white;
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 5px;
        }

        .btn-pause {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--text-sub);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 60;
            font-size: 0.9rem;
        }

        /* Listening Mode Specific */
        .btn-pause-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            border: none;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
            margin: 30px auto;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-pause-large:active {
            transform: scale(0.95);
        }

        .listening-group-name {
            font-size: 1rem;
            color: var(--text-sub);
            margin-bottom: 20px;
            background: #f1f3f5;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .control-btns {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-control {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            min-width: 100px;
        }

        /* Test Mode Enhancements */
        .settings-item {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            color: var(--text-main);
        }

        .tap-zones {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            pointer-events: none;
            z-index: 40;
        }

        .tap-zone {
            flex: 1;
            pointer-events: auto;
            cursor: pointer;
        }

        /* Visual Wait state */
        .screen.waiting .btn-group .btn {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1.05);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1.05);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Navigation Button (visible on all screens except Top) -->
        <div class="nav-bar">
            <button id="back-btn" class="btn-back" onclick="app.goBack()">← 戻る</button>
        </div>

        <!-- 1. Top Screen (Group List) -->
        <div id="top-screen" class="screen active">
            <h1>単語帳グループ選択</h1>
            <p style="margin-bottom: 20px; color: #7f8c8d;">学習するグループを選んでください</p>
            <div id="group-list" class="group-list">
                <!-- Groups will be injected here -->
            </div>
        </div>

        <!-- 2. Group Detail Screen -->
        <div id="group-detail-screen" class="screen">
            <h1 id="group-title">グループ詳細</h1>
            <p style="margin-bottom: 30px; color: #7f8c8d;">モードを選択してください</p>

            <button class="btn btn-large" onclick="app.startPractice()">
                📖 事前準備 (5回音読)
            </button>
            <button class="btn btn-large" style="background: linear-gradient(135deg, #27ae60, #219150);"
                onclick="app.startListening()">
                🎧 聞き流し (自動ループ)
            </button>
            <button class="btn btn-large" style="background: linear-gradient(135deg, #e74c3c, #c0392b);"
                onclick="app.startTest()">
                ⏱️ 1秒テスト (想起)
            </button>

            <div class="settings-item">
                <label for="listening-interval" style="font-weight: bold;">単語間のインターバル: <span
                        id="interval-value">2.0</span>秒</label>
                <input type="range" id="listening-interval" min="0.5" max="5.0" step="0.5" value="2.0"
                    oninput="document.getElementById('interval-value').innerText = parseFloat(this.value).toFixed(1)">
            </div>

            <div class="settings-item">
                <label for="test-duration" style="font-weight: bold;">意味が出るまでの時間: <span
                        id="duration-value">1.0</span>秒</label>
                <input type="range" id="test-duration" min="0.5" max="3.0" step="0.1" value="1.0"
                    oninput="document.getElementById('duration-value').innerText = this.value">
            </div>
        </div>

        <!-- 3. Practice Screen -->
        <div id="practice-screen" class="screen" onclick="app.speakCurrentWord()">
            <h2>音読練習モード</h2>
            <div id="practice-counter"
                style="font-size: 1rem; font-weight: bold; color: var(--text-sub); margin-bottom: 10px;">1 / 40</div>
            <div id="practice-word" class="korean-word"></div>
            <div id="practice-meaning" class="japanese-word visible" style="opacity: 1; color: var(--text-main);"></div>

            <div class="practice-guide">
                🗣️ コレを5回 音読して！
            </div>

            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn" id="practice-prev-btn" onclick="app.handlePracticePrev(event)"
                    style="background: #95a5a6; padding: 15px 30px; font-size: 1.1rem;">⬅ 前へ</button>
                <button class="btn" onclick="app.handlePracticeNext(event)"
                    style="background: linear-gradient(135deg, #3498db, #2980b9); padding: 15px 30px; font-size: 1.1rem;">次へ
                    ➡</button>
            </div>

            <div style="margin-top: 12px; font-size: 0.75rem; color: #bbb;">
                ← → キーまたは Enter で操作
            </div>
        </div>

        <!-- 4. Training (Test) Screen -->
        <div id="training-screen" class="screen">
            <div class="tap-zones">
                <div class="tap-zone" onclick="app.handleAnswer(false)"></div>
                <div class="tap-zone" onclick="app.handleAnswer(true)"></div>
            </div>
            <button class="btn-pause" onclick="app.togglePause()">⏸️ 一時停止</button>
            <div id="pause-overlay" class="pause-overlay">
                <div class="pause-text">PAUSE</div>
                <p style="color: #ddd; margin-top: 10px;">SPACEキーで再開</p>
            </div>

            <h2>1秒テストモード</h2>
            <div class="progress-container">
                <div id="timer-bar" class="progress-bar"></div>
            </div>

            <div id="word-display" class="korean-word"></div>
            <div id="meaning-display" class="japanese-word"></div>

            <div class="btn-group">
                <button class="btn btn-retry" onclick="app.handleAnswer(false)">もう一度</button>
                <button class="btn btn-success" onclick="app.handleAnswer(true)">わかった</button>
            </div>
            <div style="margin-top: 15px; font-size: 0.8rem; color: #ccc;">
                残り: <span id="remaining-count">0</span> 単語
            </div>
        </div>

        <!-- 5. Listening Mode Screen -->
        <div id="listening-screen" class="screen">
            <div id="listening-group-display" class="listening-group-name"></div>
            <div id="listening-counter" style="font-size: 0.9rem; color: var(--text-sub); margin-bottom: 10px;">1 / 40
            </div>

            <div id="listening-korean" class="korean-word" style="font-size: 3.5rem;"></div>
            <div id="listening-japanese" class="japanese-word visible"
                style="font-size: 1.5rem; color: var(--text-main); margin-top: 10px;"></div>

            <button id="listening-play-pause" class="btn-pause-large" onclick="app.toggleListeningPause()">
                ⏸️
            </button>

            <div class="control-btns">
                <button class="btn-control" onclick="app.handleListeningPrev()">⏮ 前へ</button>
                <button class="btn-control" onclick="app.handleListeningNext()">次へ ⏭</button>
            </div>

            <div style="margin-top: 20px; font-size: 0.8rem; color: #7f8c8d;">
                画面を閉じていても音声を再生します
            </div>
            <!-- Hidden silent audio for background keep-alive -->
            <audio id="silent-audio" loop style="display:none;"></audio>
        </div>

        <!-- 6. Result Screen -->
        <div id="result-screen" class="screen">
            <div class="confetti">🎉</div>
            <h1>完了！</h1>
            <div class="result-stats">
                このグループの学習が終わりました。<br>
                お疲れ様でした。
            </div>
            <button class="btn btn-large" onclick="app.showGroupDetail()">グループ詳細へ戻る</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script>

        class FlashcardApp {
            constructor() {
                this.currentGroup = null;
                this.words = [];
                this.practiceWords = [];
                this.practiceIndex = 0;
                this.currentWord = null;
                this._practiceKeyHandler = null;
                this._testKeyHandler = null;
                this.timer = null;
                this.testDuration = 1000; // ms
                this.isAutoPlay = true;
                this.speechSynth = window.speechSynthesis;

                // Elements
                this.backBtn = document.getElementById('back-btn');
                this.groupList = document.getElementById('group-list');
                this.groupTitle = document.getElementById('group-title');

                // Test Elements

                // Test Elements
                this.wordDisplay = document.getElementById('word-display');
                this.meaningDisplay = document.getElementById('meaning-display');
                this.timerBar = document.getElementById('timer-bar');
                this.countDisplay = document.getElementById('remaining-count');
                this.pauseOverlay = document.getElementById('pause-overlay');
                this.pauseBtn = document.querySelector('.btn-pause');

                // State
                this.isPaused = false;
                this.testPhase = 'thinking'; // 'thinking' | 'reviewing'

                this.durationSlider = document.getElementById('test-duration');

                // Listening Elements
                this.listeningScreen = document.getElementById('listening-screen');
                this.listeningGroupDisplay = document.getElementById('listening-group-display');
                this.listeningCounter = document.getElementById('listening-counter');
                this.listeningKorean = document.getElementById('listening-korean');
                this.listeningJapanese = document.getElementById('listening-japanese');
                this.listeningPlayPauseBtn = document.getElementById('listening-play-pause');
                this.listeningIntervalSlider = document.getElementById('listening-interval');

                // Listening State
                this.listeningWords = [];
                this.listeningIndex = 0;
                this.isListeningPaused = false;
                this.listeningTimeout = null;

                // Silent Audio setup
                this.silentAudio = document.getElementById('silent-audio');
                // Very short silent MP3 (base64)
                this.silentAudio.src = 'data:audio/mpeg;base64,SUQzBAAAAAABAFRYWFgAAAASAAADbWFqb3JfYnJhbmQAZGFzaABUWFhYAAAAEAAAA21pbm9yX3ZlcnNpb24AMABUWFhYAAAAHAAAA2NvbXBhdGlibGVfYnJhbmRzAGlzbzZtcDQxAFRTU0UAAAAPAAADTGF2ZjYwLjMuMTAwAAAAAAAAAAAAAAD/80DEAAAAA0gAAAAATEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVf/zQsRbAAAADSAAAAABVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV';

                this.initTopPage();
                this.setupMediaSession();
            }

            setupMediaSession() {
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.setActionHandler('play', () => this.toggleListeningPause());
                    navigator.mediaSession.setActionHandler('pause', () => this.toggleListeningPause());
                    navigator.mediaSession.setActionHandler('previoustrack', () => {
                        if (document.querySelector('.screen.active').id === 'listening-screen') {
                            this.handleListeningPrev();
                        }
                    });
                    navigator.mediaSession.setActionHandler('nexttrack', () => {
                        if (document.querySelector('.screen.active').id === 'listening-screen') {
                            this.handleListeningNext();
                        }
                    });
                }
            }

            updateMediaMetadata(word) {
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: word.ko,
                        artist: word.ja,
                        album: this.currentGroup ? this.currentGroup.name : 'トミ式韓国語',
                        artwork: [
                            { src: 'https://via.placeholder.com/512?text=' + encodeURIComponent(word.ko), sizes: '512x512', type: 'image/png' }
                        ]
                    });
                }
            }

            // --- Audio Logic ---
            speakCurrentWord() {
                if (this.currentGroup && this.practiceWords[this.practiceIndex]) {
                    const activeScreen = document.querySelector('.screen.active').id;
                    if (activeScreen === 'practice-screen') {
                        this.speak(this.practiceWords[this.practiceIndex].ko);
                    }
                }
            }

            // --- Navigation Logic ---

            initTopPage() {
                this.groupList.innerHTML = '';
                groupsData.forEach((group, index) => {
                    const div = document.createElement('div');
                    div.className = 'group-item';
                    div.innerText = group.name;
                    div.onclick = () => this.selectGroup(index);
                    this.groupList.appendChild(div);
                });
                this.showScreen('top');
            }

            selectGroup(index) {
                this.currentGroup = groupsData[index];
                this.groupTitle.innerText = this.currentGroup.name;
                this.showGroupDetail();
            }

            showGroupDetail() {
                // Return to detail from anywhere
                this.showScreen('group-detail');
            }

            goBack() {
                // Handle "Back" logic based on current screen
                const activeScreen = document.querySelector('.screen.active').id;

                if (activeScreen === 'group-detail-screen') {
                    this.showScreen('top');
                } else if (activeScreen === 'practice-screen' || activeScreen === 'training-screen' || activeScreen === 'listening-screen' || activeScreen === 'result-screen') {
                    // Stop any timers/audio
                    if (this.listeningTimeout) clearTimeout(this.listeningTimeout);
                    this.speechSynth.cancel();
                    this.stopSilentAudio();
                    this._detachPracticeKeys();
                    this._detachTestKeys();
                    this.showGroupDetail();
                }
            }

            showScreen(screenName) {
                document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
                document.getElementById(`${screenName}-screen`).classList.add('active');

                // Toggle Back Button visibility
                if (screenName === 'top') {
                    this.backBtn.style.display = 'none';
                } else {
                    this.backBtn.style.display = 'block';
                }
            }

            // --- Practice Mode (Preparation) ---

            startPractice() {
                this.practiceWords = [...this.currentGroup.words]; // Copy
                this.practiceIndex = 0;
                this.showScreen('practice');
                this.showPracticeWord();
                this._attachPracticeKeys();
            }

            showPracticeWord() {
                const word = this.practiceWords[this.practiceIndex];
                const total = this.practiceWords.length;

                this.practiceWord.innerText = word.ko;
                this.practiceMeaning.innerText = word.ja;
                this.practiceCounter.innerText = `${this.practiceIndex + 1} / ${total}`;

                // Disable prev button on first word
                this.practicePrevBtn.disabled = this.practiceIndex === 0;
                this.practicePrevBtn.style.opacity = this.practiceIndex === 0 ? '0.4' : '1';

                this.speak(word.ko);
            }

            handlePracticeNext(event) {
                if (event) event.stopPropagation();
                if (this.practiceIndex < this.practiceWords.length - 1) {
                    this.practiceIndex++;
                    this.showPracticeWord();
                } else {
                    this._detachPracticeKeys();
                    this.showScreen('result');
                }
            }

            handlePracticePrev(event) {
                if (event) event.stopPropagation();
                if (this.practiceIndex > 0) {
                    this.practiceIndex--;
                    this.showPracticeWord();
                }
            }

            _attachPracticeKeys() {
                this._detachPracticeKeys();
                this._practiceKeyHandler = (e) => {
                    if (e.key === 'ArrowRight' || e.key === 'Enter') {
                        e.preventDefault();
                        this.handlePracticeNext();
                    } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        this.handlePracticePrev();
                    } else if (e.key.toLowerCase() === 's' || e.code === 'Space') {
                        e.preventDefault();
                        this.speakCurrentWord();
                    }
                };
                document.addEventListener('keydown', this._practiceKeyHandler);
            }

            _detachPracticeKeys() {
                if (this._practiceKeyHandler) {
                    document.removeEventListener('keydown', this._practiceKeyHandler);
                    this._practiceKeyHandler = null;
                }
            }

            // --- Test Mode (Training) ---

            startTest() {
                // Initialize Word List (Deep copy)
                this.words = JSON.parse(JSON.stringify(this.currentGroup.words));
                this.words = this.shuffle(this.words);

                // Set duration from slider
                this.testDuration = parseFloat(this.durationSlider.value) * 1000;

                this.showScreen('training');
                this._attachTestKeys();
                this.nextCard();
            }

            nextCard() {
                if (this.words.length === 0) {
                    this.showScreen('result');
                    return;
                }

                this.currentWord = this.words[0];
                this.countDisplay.innerText = this.words.length;

                // Update UI
                this.wordDisplay.innerText = this.currentWord.ko;
                this.meaningDisplay.innerText = this.currentWord.ja;
                this.meaningDisplay.classList.remove('visible');
                this.timerBar.style.width = '100%';

                this.timerBar.style.transition = 'none';
                void this.timerBar.offsetWidth; // Trigger reflow

                this.speak(this.currentWord.ko);

                // Auto Timer Logic (Always on for Test Mode)
                this.startAutoTimer();
            }

            startAutoTimer() {
                // Animate Timer Bar
                this.timerBar.style.transition = `width ${this.testDuration}ms linear`;
                this.timerBar.style.width = '0%';

                this.testPhase = 'thinking';
                this.trainingScreen.classList.remove('waiting');

                // After duration, show meaning and WAIT
                this.timer = setTimeout(() => {
                    this.meaningDisplay.classList.add('visible');
                    this.testPhase = 'reviewing';
                    this.trainingScreen.classList.add('waiting');
                }, this.testDuration);
            }

            handleAnswer(isKnown) {
                if (this.isPaused) return;

                // Stop audio before moving to next word in test mode
                this.speechSynth.cancel();

                if (this.testPhase === 'thinking' && !isKnown) return; // Prevent early "Retry" if useful? Or just allow it.

                if (this.timer) clearTimeout(this.timer);

                if (isKnown) {
                    this.words.shift();
                } else {
                    this.words.push(this.words.shift());
                }
                this.nextCard();
            }

            _attachTestKeys() {
                this._detachTestKeys();
                this._testKeyHandler = (e) => {
                    const activeScreen = document.querySelector('.screen.active').id;
                    if (activeScreen !== 'training-screen') return;

                    if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        this.handleAnswer(true);
                    } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        this.handleAnswer(false);
                    }
                };
                document.addEventListener('keydown', this._testKeyHandler);
            }

            _detachTestKeys() {
                if (this._testKeyHandler) {
                    document.removeEventListener('keydown', this._testKeyHandler);
                    this._testKeyHandler = null;
                }
            }

            // --- Pause / Resume ---

            togglePause() {
                if (this.isPaused) {
                    this.resumeTest();
                } else {
                    this.pauseTest();
                }
            }

            pauseTest() {
                this.isPaused = true;
                if (this.timer) clearTimeout(this.timer);
                this.speechSynth.cancel();

                // Stop visual timer (freeze)
                const computedWidth = window.getComputedStyle(this.timerBar).width;
                this.timerBar.style.transition = 'none';
                this.timerBar.style.width = computedWidth;

                this.pauseOverlay.classList.add('visible');
                this.pauseBtn.innerText = '▶️ 再開';
            }

            resumeTest() {
                this.isPaused = false;
                this.pauseOverlay.classList.remove('visible');
                this.pauseBtn.innerText = '⏸️ 一時停止';

                if (this.testPhase === 'thinking') {
                    // Replay Logic:
                    // Reset Transition first
                    this.timerBar.style.transition = 'none';
                    this.timerBar.style.width = '100%';
                    void this.timerBar.offsetWidth; // Reflow

                    // Speak again
                    this.speak(this.currentWord.ko);

                    // Restart thinking timer
                    this.startAutoTimer();
                } else {
                    // In reviewing/waiting phase, just stay paused. 
                    // No need to set a timer since it's manual advancement now.
                }
            }

            // --- Listening Mode (Automatic loop) ---

            startListening() {
                this.listeningWords = [...this.currentGroup.words];
                this.listeningIndex = 0;
                this.isListeningPaused = false;
                this.listeningPlayPauseBtn.innerText = '⏸️';
                this.listeningGroupDisplay.innerText = this.currentGroup.name;

                this.showScreen('listening');
                this.startSilentAudio();
                this.playListeningStep();
            }

            startSilentAudio() {
                this.silentAudio.play().catch(e => console.log("Silent audio failed:", e));
            }

            stopSilentAudio() {
                this.silentAudio.pause();
                this.silentAudio.currentTime = 0;
            }

            playListeningStep() {
                if (this.listeningIndex >= this.listeningWords.length) {
                    this.showScreen('result');
                    return;
                }

                if (this.isListeningPaused) return;

                const word = this.listeningWords[this.listeningIndex];
                const total = this.listeningWords.length;
                this.listeningCounter.innerText = `${this.listeningIndex + 1} / ${total}`;

                this.listeningKorean.innerText = word.ko;
                this.listeningJapanese.innerText = '';

                this.updateMediaMetadata(word);
                this.speak(word.ko, 'ko-KR', () => {
                    if (this.isListeningPaused) return;

                    // Phase 2: Wait a bit, then Show Japanese & Play Japanese
                    this.listeningTimeout = setTimeout(() => {
                        this.listeningJapanese.innerText = word.ja;
                        this.speak(word.ja, 'ja-JP', () => {
                            if (this.isListeningPaused) return;

                            // Phase 3: Wait interval, then Next
                            const interval = parseFloat(this.listeningIntervalSlider.value) * 1000;
                            this.listeningTimeout = setTimeout(() => {
                                this.listeningIndex++;
                                this.playListeningStep();
                            }, interval);
                        });
                    }, 800); // 0.8s gap between KO and JA
                });
            }

            toggleListeningPause() {
                this.isListeningPaused = !this.isListeningPaused;
                this.listeningPlayPauseBtn.innerText = this.isListeningPaused ? '▶️' : '⏸️';

                if (this.isListeningPaused) {
                    if (this.listeningTimeout) clearTimeout(this.listeningTimeout);
                    this.speechSynth.cancel();
                    this.stopSilentAudio();
                } else {
                    this.startSilentAudio();
                    this.playListeningStep();
                }
            }

            handleListeningNext() {
                if (this.listeningTimeout) clearTimeout(this.listeningTimeout);
                this.speechSynth.cancel();
                this.listeningIndex++;
                this.isListeningPaused = false;
                this.listeningPlayPauseBtn.innerText = '⏸️';
                this.playListeningStep();
            }

            handleListeningPrev() {
                if (this.listeningTimeout) clearTimeout(this.listeningTimeout);
                this.speechSynth.cancel();
                if (this.listeningIndex > 0) {
                    this.listeningIndex--;
                }
                this.isListeningPaused = false;
                this.listeningPlayPauseBtn.innerText = '⏸️';
                this.playListeningStep();
            }

            // --- Utilities ---

            speak(text, lang = 'ko-KR', onEnd = null) {
                this.speechSynth.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang;
                utterance.rate = 1.0;
                if (onEnd) {
                    utterance.onend = onEnd;
                }
                this.speechSynth.speak(utterance);
            }

            shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }
        }

        const app = new FlashcardApp();

        // Keyboard Shortcut (Spacebar)
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                const activeScreen = document.querySelector('.screen.active');
                if (activeScreen && activeScreen.id === 'training-screen') {
                    e.preventDefault(); // Prevent scrolling
                    app.togglePause();
                }
            }
        });

        // Preload voices
        window.speechSynthesis.getVoices();
    </script>
